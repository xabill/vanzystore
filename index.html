
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VanzyStore</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#4f46e5;
}

.header{
padding:30px;
color:white;
}

.profile{
display:flex;
align-items:center;
gap:15px;
}

.logo{
width:70px;
height:70px;
background:white;
border-radius:50%;
}

.stats{
background:white;
margin:20px;
padding:25px;
border-radius:20px;
display:flex;
justify-content:space-around;
text-align:center;
}

.stats h2{
color:#4f46e5;
}

.section{
background:#f8fafc;
padding:25px;
border-radius:30px 30px 0 0;
min-height:500px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:15px;
}

.bottom a{
text-decoration:none;
color:#444;
}
</style>
</head>

<body>

<div class="header">

<div class="profile">
<div class="logo"></div>

<div>
<h1>VanzyStore</h1>
<p>⭐ 4.9 | Toko Online Premium</p>
</div>
</div>

</div>

<div class="stats">

<div>
<h2>12.5K</h2>
<p>Total Terjual</p>
</div>

<div>
<h2>8.2K</h2>
<p>Pelanggan</p>
</div>

<div>
<h2>98%</h2>
<p>Kepuasan</p>
</div>

</div>

<div class="section">

<h2>Layanan VanzyStore</h2>

<div class="grid">

<div class="card">
🛒
<h3>Produk</h3>
</div>

<div class="card">
💳
<h3>Pembayaran</h3>
</div>

<div class="card">
📦
<h3>Pesanan</h3>
</div>

<div class="card">
👤
<h3>Akun</h3>
</div>

</div>

</div>

<div class="bottom">
<a href="#">🏠<br>Home</a>
<a href="#">🔍<br>Cari</a>
<a href="#">🛒<br>Keranjang</a>
<a href="#">👤<br>Profil</a>
</div>

</body>
</html>
